<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartHome Dashboard</title>

  <!-- SweetAlert 2 CSS -->
  <link rel="stylesheet" href="/libs/swal2/style.css" />

  <style>
    @import url(https://fonts.googleapis.com/css?family=Kalam:300,regular,700);

    body {
      background: #282c34;
      color: white;
      padding: 0;
      margin: 0;
    }

    * {
      font-family: Kalam, sans-serif !important;
      transition: all 0.3s;
    }

    .login-container {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      form {
        width: auto;
        display: flex;
        flex-direction: column;
        gap: 1rem;

        input {
          padding: 0.5rem;
          border: none;
          border-radius: 4px;
          font-size: 1rem;
        }

        button {
          padding: 0.5rem;
          border: none;
          border-radius: 4px;
          background-color: #61dafb;
          color: #282c34;
          font-size: 1rem;
          cursor: pointer;

          &:hover {
            background-color: #21a1f1;
          }
        }
      }
    }
  </style>
</head>

<body>
  <div class="login-container">
    <h1 class="my-4">SmartHome Dashboard</h1>

    <form id="login-form">
      <input type="text" id="username" placeholder="username" name="username" />
      <input type="password" id="password" name="password" placeholder="password" />

      <button type="submit">
        Login
      </button>
    </form>
  </div>

  <!-- SweetAlert 2 JS -->
  <script src="/libs/swal2/swal.js"></script>

  <script>
    if (localStorage.getItem('loggedIn') === 'true') {
      window.location.href = '/dashboard';
    }

    document.querySelector('#login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.querySelector('#username').value;
      const password = document.querySelector('#password').value;

      if (!username || !password) {
        Swal.fire({
          icon: 'error',
          title: 'Error',
          text: 'Please enter both username and password.',
        });
        return;
      }

      if (username === 'admin' && password === 'admin') {
        Swal.fire({
          icon: 'success',
          title: 'Success',
          text: 'Login successful!',
        }).then(() => {
          localStorage.setItem('loggedIn', 'true');
          window.location.href = '/dashboard';
        });
      } else {
        Swal.fire({
          icon: 'error',
          title: 'Error',
          text: 'Invalid username or password.',
        });
      }
    });
  </script>
</body>

</html>
